kind = "web"
previewPath = "/"
title = "Lopes Imobiliária — Uniformes"
version = "1.0.0"
id = "artifacts/lopes-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25128

[services.development]
run = "pnpm --filter @workspace/lopes-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lopes-app", "run", "build" ]
publicDir = "artifacts/lopes-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25128"
BASE_PATH = "/"
